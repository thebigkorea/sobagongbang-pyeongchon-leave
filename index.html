<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="manifest" href="./manifest.json" />
<link rel="stylesheet" href="./style.css" />

<title>평촌 소바공방 연월차 신청</title>
</head>

<body>

<div class="app">

<div class="header-card">
<h1>연월차 신청</h1>
<p>평촌 소바공방 직원용</p>
</div>

<div class="menu">

<button onclick="showSection('apply')">신청</button>
<button onclick="showSection('register')">직원등록</button>
<button onclick="showSection('history')">내역조회</button>
<button onclick="showSection('balance')">잔여확인</button>

</div>


<section id="apply">

<label>매장</label>
<input value="평촌 소바공방" readonly />

<label>이름</label>
<input id="name" />

<label>연락처</label>
<input id="phone" />

<label>시작일</label>
<input type="date" id="startDate" />

<label>종료일</label>
<input type="date" id="endDate" />

<button onclick="submitLeave()">신청하기</button>

</section>


<section id="register" class="hidden">

<label>이름</label>
<input id="regName" />

<label>연락처</label>
<input id="regPhone" />

<label>입사일</label>
<input type="date" id="joinDate" />

<button onclick="registerEmployee()">등록</button>

</section>


<section id="history" class="hidden">

<label>연락처</label>
<input id="historyPhone" />

<button onclick="loadHistory()">조회</button>

<div id="historyResult"></div>

</section>


<section id="balance" class="hidden">

<label>이름</label>
<input id="balanceName" />

<label>연락처</label>
<input id="balancePhone" />

<button onclick="checkBalance()">잔여연차 확인</button>

<div id="balanceResult"></div>

</section>


<section class="footer-link">
<button class="admin-go-btn" onclick="goAdmin()">관리자 승인 페이지</button>
</section>

</div>

<script src="./script.js"></script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
